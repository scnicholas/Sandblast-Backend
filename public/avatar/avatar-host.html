    a.src = TTS.currentUrl;
    a.muted = false;
    a.volume = 1;
    a.load();
    var p = a.play();
    if(p && typeof p.catch === "function"){
      p.catch(function(err){
        TTS.locked = true;
        TTS.inFlight = false;
        document.body.classList.add("audio-locked");
        TTS.lastErr = (err && err.name) ? err.name : "PLAY_BLOCKED";
        setHint("Audio blocked — tap Enable Audio.");
        debugState("play_blob_fail", {err:TTS.lastErr, meta:meta||{}});
      });
    }
    debugState("play_blob", {bytes:blob.size, type:blob.type||"audio/mpeg", meta:meta||{}});
    return true;
  }
  function flushPostedAudio(){ if(!TTS.pendingPosted || TTS.locked || !TTS.armed || !VOICE.voiceOn) return false; var p=TTS.pendingPosted; TTS.pendingPosted=null; return playPostedAudio(p); }
  function playPostedAudio(payload){
    payload = payload && typeof payload === "object" ? payload : {};
    var mime = safeStr(payload.mimeType, 80).trim() || "audio/mpeg";
    var b64 = safeStr(payload.base64, 12000000).trim();
    var key = safeStr(payload.traceId || (mime + ":" + b64.slice(0,32)), 200);
    if(key && key === TTS.postedSeen) return true;
    if(!VOICE.voiceOn){ TTS.pendingPosted = payload; return false; }
    if(!TTS.armed || TTS.locked){ queuePostedAudio(payload); return false; }
    if(!b64){ TTS.lastErr = "POSTED_AUDIO_EMPTY"; setHint("Audio payload empty."); debugState("posted_empty", {}); return false; }
    var blob = base64ToBlob(b64, mime);
    if(!blob || !blob.size){ TTS.lastErr = "POSTED_AUDIO_DECODE_FAIL"; setHint("Posted audio failed to decode."); debugState("posted_decode_fail", {mime:mime}); return false; }
    TTS.postedSeen = key;
    return playBlob(blob, {posted:true, traceId:safeStr(payload.traceId,120)});
  }
  function ttsEndpoint(){ return apiBase() + "/api/tts"; }
  function enqueueSpeak(text){ var t=safeStr(text, 2200).trim(); if(!t) return; TTS.q.push({id:makeId(), text:t}); ttsPump(false); }
  function stopSpeaking(){
    try{ if(window.speechSynthesis) window.speechSynthesis.cancel(); }catch(_){}
    TTS.q = [];
    TTS.pendingPosted = null;
    TTS.inFlight = false;
    clearAudioSource();
    debugState("stop", {});
  }
  function apiBase(){ var b = (CONFIG.apiBase && String(CONFIG.apiBase).trim()) ? String(CONFIG.apiBase).trim() : location.origin; return b.replace(/\/+$/,""); }
  function ttsPump(force){
    var a = ttsAudioEl();
    if(!a) return;
    if(TTS.pendingPosted && !TTS.locked && TTS.armed && VOICE.voiceOn){ if(flushPostedAudio()) return; }
    if(TTS.inFlight && !force) return;
    if(!VOICE.voiceOn) return;
    if(!TTS.armed || TTS.locked){ document.body.classList.add("audio-locked"); return; }
    try{ if(!a.paused && !force) return; }catch(_){}
    var job = TTS.q.shift();
    if(!job) return;
    TTS.inFlight = true;
    TTS.activeJobId = job.id;
    var payload = { text: job.text, data: job.text, format:"mp3", output_format:"mp3", voice:"nyx", client:{source:"avatar_host_tts", build:CONFIG.version} };
    var headers = {"Content-Type":"application/json"};
    if(CONFIG.token){ headers["x-sb-token"] = CONFIG.token; headers["Authorization"] = "Bearer " + CONFIG.token; headers["X-API-Token"] = CONFIG.token; }
    fetch(ttsEndpoint(), {method:"POST", headers:headers, body:JSON.stringify(payload), credentials:"include"}).then(function(r){
      if(!r || !r.ok) throw new Error("TTS_HTTP_" + (r ? r.status : 0));
      var ct = (r.headers && r.headers.get && r.headers.get("content-type")) || "audio/mpeg";
      return r.blob().then(function(b){ return {blob:b, mime:ct}; });
    }).then(function(out){
      if(TTS.activeJobId !== job.id) return;
      var b = out.blob;
      if(!b || !b.size || b.size < 512) throw new Error("TTS_EMPTY_AUDIO");
      if(!mimeLooksPlayable(out.mime) && !mimeLooksPlayable(b.type)){
        throw new Error("TTS_BAD_MIME");
      }
      playBlob(b, {jobId:job.id, backend:true});
    }).catch(function(err){
      TTS.inFlight = false;
      TTS.lastErr = (err && err.message) ? err.message : "TTS_FAIL";
      setHint("Audio issue — tap 🔈 then try again.");
      debugState("tts_fail", {err:TTS.lastErr});
    });
  }

  function sendReady(){ postToParent({ type:"NYX_READY", v: CONFIG.version, ts: now() }, true); }
  sendReady();
  var tries=0, maxTries=14;
  var __readyTimer = setInterval(function(){ tries++; if(tries>maxTries){ clearInterval(__readyTimer); return; } sendReady(); }, 250);
  try{ window.addEventListener("pointerdown", function(){ armAudio(); }, { once:true, passive:true }); window.addEventListener("keydown", function(){ armAudio(); }, { once:true, passive:true }); }catch(_){}

  window.addEventListener("message", function(ev){
    try{
      var data = ev && ev.data;
      if(typeof data === "string"){ var p = safeJsonParse(data); if(p) data = p; }
      if(!data || typeof data !== "object") return;
      if(typeof data.type !== "string" || data.type.indexOf("NYX_") !== 0) return;
      if(!PARENT_ORIGIN && ev.origin){ PARENT_ORIGIN = ev.origin; }
      if(PARENT_ORIGIN && ev.origin !== PARENT_ORIGIN) return;
      if(data.type === "NYX_CONFIG"){
        applyConfigPartial(data.config || {});
        try{ if(__readyTimer) clearInterval(__readyTimer); }catch(_){}
        postToParent({ type:"NYX_CONFIG_ACK", v: CONFIG.version, ts: now() }, false);
        setTimeout(function(){ voiceInitMaybe(); }, 0);
      }
      if(data.type === "NYX_ARM_AUDIO"){ armAudio(); VOICE.voiceOn = true; updateVoiceUI(); flushPostedAudio(); }
      if(data.type === "NYX_STOP_AUDIO"){ stopSpeaking(); }
      if(data.type === "NYX_TTS_AUDIO"){ playPostedAudio(data.payload || {}); }
    }catch(_){}
  });

  function emitResize(){ if(!widget) return; var rect = widget.getBoundingClientRect(); var h = Math.ceil(rect.height); postToParent({ type:"NYX_RESIZE", h:h, ts:now() }, true); }
  if(widget && window.ResizeObserver){ try{ var ro = new ResizeObserver(function(){ emitResize(); }); ro.observe(widget); setTimeout(emitResize, 250); }catch(_){} }
  else { try{ if(window.__NYX_RESIZE_TMR__) clearInterval(window.__NYX_RESIZE_TMR__); }catch(_){} window.__NYX_RESIZE_TMR__ = setInterval(emitResize, 800); }

  (function bindNavVeil(){ var veil=$("nyxNavVeil"); if(!veil) return; veil.addEventListener("click", function(e){ var t=e.target; while(t && t!==veil && !(t.getAttribute && t.getAttribute("data-nav"))){ t=t.parentNode; } if(!t || t===veil) return; var href=t.getAttribute("data-nav"); if(!href) return; postToParent({type:"NYX_NAV", href:href, ts:now()}, true); try{ if(window.top && window.top.location){ window.top.location.href = href; return; } }catch(_){} try{ window.location.href = href; }catch(_){} }, true); })();

  function _sig(role, text){ return role + "::" + safeStr(text,220).toLowerCase().replace(/\s+/g," ").trim(); }
  function _loopGuard(role, text){ var s=_sig(role,text), t=now(); if(s && s===LOOP.lastSig && (t-LOOP.lastAt)<=LOOP.windowMs){ LOOP.streak++; } else { LOOP.lastSig=s; LOOP.streak=0; } LOOP.lastAt=t; if(role==="nyx" && LOOP.streak>=LOOP.maxStreak){ LOOP.streak=0; return {blocked:true,replacement:"I’m catching a loop on my side. Quick reset: pick a mode chip, or tell me what you want in one sentence. If it keeps happening, hit Reset and I’ll reconnect cleanly."}; } return {blocked:false}; }
  function setMarionOn(on){ if(marionEl) marionEl.classList.toggle("on", !!on); }
  function extractBridge(res){ if(!res || typeof res !== "object") return null; return res.bridge || (res.cog && res.cog.bridge) || (res.data && (res.data.bridge || (res.data.cog && res.data.cog.bridge))) || null; }
  function bridgeBadge(bridge){ if(!bridge || typeof bridge !== "object") return ""; var lane=safeStr(bridge.lane||"").trim(), mode=safeStr(bridge.mode||"").trim(), intent=safeStr(bridge.intent||"").trim(), stage=safeStr(bridge.stage||"").trim(), firedN=0, loopFlag=""; try{ firedN=(bridge.knowledge && bridge.knowledge.fired && bridge.knowledge.fired.length) ? bridge.knowledge.fired.length : 0; }catch(_){} try{ if(bridge.loop && bridge.loop.flag) loopFlag=" · LOOP"; }catch(_){} var parts=[]; if(lane) parts.push(lane); if(mode) parts.push(mode); if(intent) parts.push(intent); if(stage) parts.push(stage); var base=parts.join(" · "); if(firedN) base += " · K:" + firedN; return base + loopFlag; }
  function pickAck(bridge){ var ack=""; try{ ack=safeStr(bridge && bridge.tempo && bridge.tempo.ack,80).trim(); }catch(_){} if(!ack){ if(UI.lane==="music") ack="Got it — music mode."; else if(UI.lane==="roku") ack="Okay — Roku."; else if(UI.lane==="radio") ack="Alright — Radio."; else ack="Got it."; } return ack; }
  function replaceMsg(id, newText, newMeta){ if(!id) return false; for(var i=0;i<THREAD.length;i++){ if(THREAD[i] && THREAD[i].id===id){ THREAD[i].text = safeStr(newText).trim() || THREAD[i].text; if(newMeta) THREAD[i].meta = newMeta; return true; } } return false; }
  function setActiveChip(chip){ UI.lane=safeStr(chip).toLowerCase().trim() || "general"; if(chipsEl){ var list=chipsEl.querySelectorAll(".chip"); for(var i=0;i<list.length;i++){ var el=list[i]; el.classList.toggle("is-active", el.getAttribute("data-chip")===UI.lane); } } }
  function updateEmptyState(){ if(widget) widget.classList.toggle("is-empty", THREAD.length===0); }
  function pushMsg(role, text, meta){ text=safeStr(text).trim(); if(!text) return null; var g=_loopGuard(role,text); if(g && g.blocked) text=g.replacement; var id=makeId(); THREAD.push({id:id, role:role, text:text, ts:now(), meta:meta||null}); if(THREAD.length > MAX_TURNS) THREAD = THREAD.slice(THREAD.length - MAX_TURNS); updateEmptyState(); return id; }
  function renderMsgs(){ if(!msgsEl) return; msgsEl.innerHTML=""; for(var i=0;i<THREAD.length;i++){ var m=THREAD[i], div=document.createElement("div"); div.className="nyx-msg" + (m.role==="user" ? " me" : ""); div.textContent=m.text; msgsEl.appendChild(div); } try{ if(scrollEl) scrollEl.scrollTop = scrollEl.scrollHeight; }catch(_){} emitResize(); }
  async function postJson(url, payload, opts){ var timeoutMs=14000, signal=null; if(typeof opts === "number") timeoutMs=opts; else if(opts && typeof opts === "object"){ if(typeof opts.timeoutMs === "number") timeoutMs=opts.timeoutMs; if(opts.signal) signal=opts.signal; } var headers={"Content-Type":"application/json"}; if(CONFIG.token){ headers["x-sb-token"] = CONFIG.token; headers["Authorization"] = "Bearer " + CONFIG.token; headers["X-API-Token"] = CONFIG.token; } var ctrl=null, to=null; if(!signal){ ctrl=new AbortController(); signal=ctrl.signal; to=setTimeout(function(){ try{ ctrl.abort(); }catch(_){} }, timeoutMs); } else { to=setTimeout(function(){}, timeoutMs); } try{ var r=await fetch(url,{method:"POST",headers:headers,body:JSON.stringify(payload),credentials:"include",signal:signal}); var txt=await r.text().catch(function(){ return ""; }); var json=safeJsonParse(txt); if(!json) return {ok:false,error:"bad_json",status:r.status,raw:txt.slice(0,500)}; json.__httpStatus=r.status; json.__rawText=txt; return json; } catch(e){ return {ok:false,error:(e && e.name === "AbortError") ? "aborted" : "network",status:0}; } finally { if(to) clearTimeout(to); } }
  function updateVoiceUI(){ if(voiceBtn){ voiceBtn.classList.toggle("on", !!VOICE.voiceOn); voiceBtn.textContent = VOICE.voiceOn ? "🔊" : "🔈"; voiceBtn.setAttribute("aria-pressed", VOICE.voiceOn ? "true" : "false"); voiceBtn.title = VOICE.voiceOn ? "Voice ON" : "Voice OFF"; } if(micBtn){ micBtn.classList.toggle("hot", !!VOICE.micOn); micBtn.setAttribute("aria-pressed", VOICE.micOn ? "true" : "false"); micBtn.title = VOICE.micOn ? "Listening…" : "Speech to text"; } }
  function speak(text){ text=safeStr(text,900).trim(); if(!text || !VOICE.voiceOn) return; enqueueSpeak(text); VOICE.pendingIntro = false; }
  function ensureRecognizer(){ if(!SpeechRec) return null; if(rec) return rec; try{ rec=new SpeechRec(); rec.lang="en-US"; rec.interimResults=true; rec.maxAlternatives=1; rec.onresult=function(ev){ try{ var finalText="", interim=""; for(var i=ev.resultIndex;i<ev.results.length;i++){ var r=ev.results[i]; var t=(r && r[0] && r[0].transcript) ? String(r[0].transcript) : ""; if(r.isFinal) finalText += t; else interim += t; } if(inputEl) inputEl.value = (finalText || interim || "").trim(); if(finalText && VOICE.autoSend){ toggleMic(false); var v=finalText.trim(); if(inputEl) inputEl.value=""; sendText(v, {from:"stt"}); } }catch(_){} }; rec.onerror=function(){ toggleMic(false); }; rec.onend=function(){ if(VOICE.micOn){ VOICE._restartCount=(VOICE._restartCount||0)+1; var t=now(); VOICE._restartWindowAt = VOICE._restartWindowAt || t; if((t-VOICE._restartWindowAt) > 10000){ VOICE._restartWindowAt=t; VOICE._restartCount=1; } if(VOICE._restartCount > 6){ VOICE.micOn=false; updateVoiceUI(); pushMsg("nyx","Mic paused to prevent a browser loop. Tap 🎙 again to resume."); renderMsgs(); return; } setTimeout(function(){ try{ rec.start(); }catch(_){ VOICE.micOn=false; updateVoiceUI(); } }, 180); } }; return rec; }catch(_){ return null; } }
  function toggleMic(force){ if(!VOICE.supportedSTT){ VOICE.micOn=false; updateVoiceUI(); return; } if(typeof force === "boolean") VOICE.micOn=force; else VOICE.micOn=!VOICE.micOn; var r=ensureRecognizer(); if(!r){ VOICE.micOn=false; updateVoiceUI(); return; } if(VOICE.micOn){ try{ stopSpeaking(); r.start(); }catch(_){ VOICE.micOn=false; } } else { try{ r.stop(); }catch(_){} } updateVoiceUI(); }
  function voiceInitMaybe(){ if(VOICE.voiceOn===false && CONFIG.voiceDefaultOn===true) VOICE.voiceOn=true; VOICE.autoSend = (CONFIG.sttAutoSend !== false); updateVoiceUI(); if(VOICE.voiceOn){ VOICE.pendingIntro=true; setTimeout(function(){ speak("Hi. I’m Nyx. Pick a mode, or tell me what you need."); }, 350); } }
  function gestureUnlock(){ if(!VOICE.pendingIntro || !VOICE.voiceOn) return; VOICE.pendingIntro=false; armAudio(); speak("Hi. I’m Nyx. Pick a mode, or tell me what you need."); }
  window.addEventListener("pointerdown", gestureUnlock, { passive:true });
  window.addEventListener("keydown", gestureUnlock);

  async function sendText(text, meta){
    text = safeStr(text).trim(); if(!text) return;
    try{ if(SEND.activeCtrl) SEND.activeCtrl.abort(); }catch(_){}
    SEND.activeTurn = (SEND.activeTurn || 0) + 1;
    var turn = SEND.activeTurn, requestId = makeId();
    SEND.activeReqId = requestId;
    SEND.activeCtrl = new AbortController();
    var signal = SEND.activeCtrl.signal;
    SEND.inFlight = true;
    if(sendBtn) sendBtn.disabled = true;
    if(inputEl) inputEl.disabled = true;
    pushMsg("user", text, meta); renderMsgs();
    var ackId = pushMsg("nyx", "…", {kind:"ack", requestId:requestId, turn:turn, temp:true}); renderMsgs();
    var url = apiBase() + (CONFIG.chatPath || "/api/chat");
    var packet = {requestId:requestId, text:text, lane:UI.lane, ctx:{tail:THREAD.slice(-10).map(function(m){ return {r:m.role,t:safeStr(m.text,360)}; }), source:"nyx_widget_console", context:safeStr(CONFIG.context,40)}, client:{source:"nyx_host_iframe", lane:UI.lane}};
    postToParent({type:"NYX_USER_TEXT", text:text, lane:UI.lane, ts:now(), requestId:requestId}, true);
    var res = await postJson(url, packet, {timeoutMs:16000, signal:signal});
    if(turn !== SEND.activeTurn || requestId !== SEND.activeReqId) return;
    var bridge = extractBridge(res), ack = pickAck(bridge); if(ackId) replaceMsg(ackId, ack, {kind:"ack", requestId:requestId, turn:turn, temp:false, bridge:bridge||null});
    var reply = "";
    if(res){ reply = safeStr(res.reply || res.text || (res.data && (res.data.reply || res.data.text)) || ""); if(!reply && res.ok && res.message) reply = safeStr(res.message); }
    if(!reply && res && res.ok === false){ if(res.error === "aborted") reply = "Okay — interrupted. Say that again when you’re ready."; else reply = "Connection issue. Pass apiBase/token via NYX_CONFIG so I can reach the backend."; }
    if(!reply) reply = "…";
    if(res && res.lane && typeof res.lane === "string") setActiveChip(res.lane.toLowerCase());
    if(res && typeof res.marionOn === "boolean") setMarionOn(res.marionOn); else if(bridge) setMarionOn(true);
    try{ if(marionEl && bridge){ var b = bridgeBadge(bridge); if(b) marionEl.title = b; } }catch(_){}
    pushMsg("nyx", reply, {kind:"reply", requestId:requestId, turn:turn, bridge:bridge||null}); renderMsgs();
    if(VOICE.voiceOn){ var wasMic = VOICE.micOn; if(wasMic){ VOICE.pendingResume = !!VOICE.autoSend; toggleMic(false); } enqueueSpeak(reply); }
    SEND.inFlight = false; if(sendBtn) sendBtn.disabled = false; if(inputEl) inputEl.disabled = false; try{ if(inputEl) inputEl.focus(); }catch(_){}
  }

  if(sendBtn){ sendBtn.addEventListener("click", function(){ var v=inputEl ? inputEl.value : ""; if(inputEl) inputEl.value=""; sendText(v,{from:"typed"}); }); }
  if(inputEl){ inputEl.addEventListener("keydown", function(e){ if(e.key === "Enter"){ e.preventDefault(); var v=inputEl.value; inputEl.value=""; sendText(v,{from:"typed"}); } }); }
  if(chipsEl){ chipsEl.addEventListener("click", function(e){ var t=e.target; while(t && t!==chipsEl && !(t.classList && t.classList.contains("chip"))){ t=t.parentNode; } if(!t || t===chipsEl) return; var chip=t.getAttribute("data-chip"); if(!chip) return; setActiveChip(chip); postToParent({type:"NYX_CHIP", chip:UI.lane, lane:UI.lane, ts:now()}, true); try{ var url=apiBase() + (CONFIG.chatPath || "/api/chat"); postJson(url,{requestId:makeId(), type:"lane_select", lane:UI.lane, ctx:{source:"nyx_widget_console"}},6000).catch(function(){}); }catch(_){} }); }
  if(focusBtn){ focusBtn.addEventListener("click", function(){ UI.focused=!UI.focused; document.body.classList.toggle("is-focus", UI.focused); focusBtn.textContent = UI.focused ? "Compact" : "Focus"; emitResize(); if(inputEl) inputEl.focus(); }); }
  if(voiceBtn){ voiceBtn.addEventListener("click", function(){ VOICE.voiceOn = !VOICE.voiceOn; if(VOICE.voiceOn){ armAudio(); flushPostedAudio(); ttsPump(false); } else { stopSpeaking(); } updateVoiceUI(); emitResize(); if(inputEl) inputEl.focus(); }); }
  if(micBtn){ micBtn.addEventListener("click", function(){ toggleMic(); emitResize(); if(inputEl) inputEl.focus(); }); }

  setActiveChip("general");
  if(THREAD.length === 0) pushMsg("nyx", "Hi. I’m Nyx. Pick a mode, or tell me what you need.");
  renderMsgs(); if(inputEl) inputEl.focus();
  setTimeout(function(){ voiceInitMaybe(); }, 0);
  (function bindAudioUnlock(){ var veil=$("nyxAudioUnlock"); if(!veil) return; function go(){ armAudio(); VOICE.voiceOn = true; updateVoiceUI(); if(!TTS.locked){ document.body.classList.remove("audio-locked"); setHint("Audio ready."); if(VOICE.pendingIntro){ speak("Hi. I’m Nyx. Pick a mode, or tell me what you need."); } flushPostedAudio(); ttsPump(false); } } veil.addEventListener("click", function(){ go(); }, true); veil.addEventListener("keydown", function(e){ if(e.key==="Enter"||e.key===" "){ e.preventDefault(); go(); } }, true); })();
})();
</script>
